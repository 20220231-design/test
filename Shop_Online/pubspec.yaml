name: shop_online
description: Flutter Shop Online App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI cơ bản
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.2

  # Firebase core
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3

  # Image & UI
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  fluttertoast: ^8.2.8

  # 🔥 NÂNG CẤP UI SHOP
  shimmer: ^3.0.0
  intl: ^0.20.2
  badges: ^3.1.2
  flutter_screenutil: ^5.9.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true